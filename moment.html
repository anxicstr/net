<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Moment 2024 - 2026</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;

    background:url("pantai.jpg") no-repeat center center/cover;
}

/* tombol utama */

.btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.8);
    cursor:pointer;
}

/* menu */

.menu{
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    display:none;
}

.menu button{
    display:block;
    margin:10px;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

/* burung kecil */

.bird{
    position:absolute;
    font-size:14px; /* kecil */
    opacity:0.8;
    animation:fly linear forwards;
}

@keyframes fly{
    from{
        transform:translateX(-50px);
    }
    to{
        transform:translateX(110vw);
    }
}

</style>
</head>

<body>

<button class="btn" onclick="showMenu()">Klik Moment</button>

<div class="menu" id="menu">
<button>Moment 2024</button>
<button>Moment 2025</button>
<button>Moment 2026</button>
</div>

<script>

/* tampilkan menu */

function showMenu(){
document.getElementById("menu").style.display="block";
}

/* membuat banyak burung kecil */

function createBird(){

let bird=document.createElement("div");
bird.className="bird";

/* simbol burung kecil */
bird.innerHTML="🕊";

/* posisi acak di langit */
bird.style.top=Math.random()*60+"vh";

/* durasi terbang */
bird.style.animationDuration=(10+Math.random()*10)+"s";

document.body.appendChild(bird);

setTimeout(()=>{
bird.remove();
},20000);

}

/* burung muncul terus */
setInterval(createBird,1000);

</script>

</body>
</html>
