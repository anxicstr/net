<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eposyuda</title>

<link rel="icon" type="image/png" sizes="32x32" href="logo1.png">

<meta name="description" content="JJ My Kisah - kumpulan momen 2024, 2025, 2026 dengan video background dan musik latar.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

/* VIDEO BACKGROUND */
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* CONTAINER */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}

/* TITLE */
.title{
  font-size:48px;
  text-shadow:0 0 20px black;
  margin-bottom:40px;
}

/* MENU GRID */
.menu{
  display:grid;
  grid-template-columns:repeat(3,220px);
  gap:25px;
}

/* CARD */
.card{
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.4);
  padding:30px;
  border-radius:16px;
  text-decoration:none;
  color:white;
  font-size:20px;
  font-weight:bold;
  transition:0.35s;
  opacity:0;
  transform:translateY(40px);
  animation: fadeInUp 0.6s forwards;
  animation-delay: var(--delay);
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  background:rgba(255,255,255,0.35);
}

/* ANIMATION */
@keyframes fadeInUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* MOBILE */
@media(max-width:768px){

.title{
font-size:30px;
}

.menu{
grid-template-columns:1fr;
width:85%;
gap:15px;
}

.card{
font-size:18px;
padding:24px;
}

}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video class="video-bg" autoplay muted loop playsinline poster="pantai.jpg">
<source src="pantai.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="bg.mp3" type="audio/mpeg">
</audio>

<!-- CONTENT -->
<div class="container">

<h1 class="title">My Kisah</h1>

<div class="menu">

<a href="moment2024.html" class="card" style="--delay:0s">
📸 2024
</a>

<a href="moment2025.html" class="card" style="--delay:0.3s">
🌅 2025
</a>

<a href="moment2026.html" class="card" style="--delay:0.6s">
✨ 2026
</a>

</div>

</div>

<script>

let music = document.getElementById("music");

/* klik dimana saja untuk mulai musik */
document.addEventListener("click", function(){

music.play();

}, { once:true });

</script>

</body>
</html>
